services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file:
      - ./env/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/api.env
    environment:
      APP_RELEASE: ${APP_RELEASE:-}
    depends_on:
      postgres:
        condition: service_healthy
      smtp-relay:
        condition: service_started

  newsletter-scheduler:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/api.env
    environment:
      APP_RELEASE: ${APP_RELEASE:-}
      NEWSLETTER_WORD_OF_DAY_TZ: ${NEWSLETTER_WORD_OF_DAY_TZ:-America/Sao_Paulo}
      NEWSLETTER_WORD_OF_DAY_TIME: ${NEWSLETTER_WORD_OF_DAY_TIME:-10:00}
    command: ["uv", "run", "python", "-m", "app.core.schedule_word_of_day"]
    depends_on:
      postgres:
        condition: service_healthy
      smtp-relay:
        condition: service_started

  smtp-relay:
    image: boky/postfix:latest
    restart: unless-stopped
    environment:
      ALLOWED_SENDER_DOMAINS: ${SMTP_ALLOWED_SENDER_DOMAINS:-academiatupi.com}
      RELAYHOST: ${SMTP_RELAYHOST:-}
      RELAYHOST_USERNAME: ${SMTP_RELAYHOST_USERNAME:-}
      RELAYHOST_PASSWORD: ${SMTP_RELAYHOST_PASSWORD:-}

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
